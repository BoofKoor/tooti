services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tooti
      POSTGRES_PASSWORD: tooti
      POSTGRES_DB: tooti
    ports:
      - '5432:5432'
    volumes:
      - tooti-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tooti -d tooti']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tooti:tooti@db:5432/tooti?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-insecure-secret-change-me}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      EMAIL_SERVER: ${EMAIL_SERVER:-}
      EMAIL_FROM: ${EMAIL_FROM:-Tooti <login@tooti.academy>}
      AUTH_TRUST_HOST: 'true'
    ports:
      - '3000:3000'

volumes:
  tooti-db:
